# Fútbol 11 con el modelo específico de Roboflow (player/GK/referee/ball).
# Requiere la variable de entorno ROBOFLOW_API_KEY.
sport: football11
detector: roboflow
radar: true            # vista cenital + distancias en metros (Fase 2)
radar_recalibrate_every: 25  # recalcula la homografía cada N frames. Con cámara fija
                             # la cancha no se mueve: recalibrar ~1 vez/seg (25-30)
                             # basta y evita correr el modelo de campo en cada frame
                             # (~2x más rápido). Baja a 1 solo si hay paneos rápidos.

model:
  model_id: "football-players-detection-3zvbc/11"
  confidence: 0.3

# Clases del modelo de Roboflow (orden del dataset football-players-detection):
classes:
  ball: 0
  goalkeeper: 1
  player: 2
  referee: 3

teams:
  num_teams: 2
  fit_min_players: 4

tracker:
  lost_track_buffer: 60
  track_activation_threshold: 0.25
  minimum_matching_threshold: 0.8

detect_filter:
  min_box_height: 0     # el modelo de fútbol ya es limpio; sin filtro

pitch:
  length_m: 105
  width_m: 68
